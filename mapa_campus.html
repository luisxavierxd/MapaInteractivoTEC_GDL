<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Campus - Tec de Monterrey GDL</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  #map { height: 100vh; width: 100%; }
  .leaflet-popup-content-wrapper { border-radius: 8px; }
  .building-popup h3 { margin: 0 0 4px; font-size: 15px; color: #1a1a1a; }
  .building-popup p { margin: 0; font-size: 13px; color: #555; }
</style>
</head>
<body>
<div id="map"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script>
  // 1. Mapa base centrado en Tec de Monterrey Campus GDL
  const map = L.map('map').setView([20.7343, -103.4559], 16);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
  }).addTo(map);

  // 2. PEGA AQUI el contenido completo de tu export.geojson de Overpass Turbo
  //    Reemplaza TODO este objeto "campusData" por el tuyo (solo borra esto y pega el archivo)
  const campusData = {
    "type": "FeatureCollection",
    "features": [
      {
        "type": "Feature",
        "properties": { "name": "Edificio de ejemplo (reemplázame)" },
        "geometry": {
          "type": "Polygon",
          "coordinates": [[
            [-103.4570, 20.7350],
            [-103.4560, 20.7350],
            [-103.4560, 20.7345],
            [-103.4570, 20.7345],
            [-103.4570, 20.7350]
          ]]
        }
      }
    ]
  };

  // 3. Capa de edificios: estilo + popup al hacer click + hover
  const buildingsLayer = L.geoJSON(campusData, {
    style: {
      color: "#2563eb",
      weight: 2,
      fillColor: "#3b82f6",
      fillOpacity: 0.25
    },
    onEachFeature: function (feature, layer) {
      const name = feature.properties.name || "Edificio sin nombre";
      layer.bindPopup(`<div class="building-popup"><h3>${name}</h3><p>Click para más info</p></div>`);
      layer.on({
        mouseover: e => e.target.setStyle({ fillOpacity: 0.5 }),
        mouseout: e => e.target.setStyle({ fillOpacity: 0.25 })
      });
    }
  }).addTo(map);

  // 4. Encuadra el mapa para mostrar todo el campus automáticamente
  if (campusData.features.length) {
    map.fitBounds(buildingsLayer.getBounds(), { padding: [20, 20] });
  }
</script>
</body>
</html>
